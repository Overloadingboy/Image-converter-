<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreConvert // Asset Studio</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121216;
            --accent: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.2);
            --border: #22222a;
            --text-muted: #888894;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .converter-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Drag & Drop Area */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 24px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(0, 255, 255, 0.02);
            box-shadow: inset 0 0 15px var(--accent-glow);
        }

        .drop-zone icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }

        /* Options & Dropdowns */
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: border 0.2s;
        }

        select:focus {
            border-color: var(--accent);
        }

        /* Convert Button */
        .btn-convert {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-convert:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-convert:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="converter-card">
            <h1>CORE<span>CONVERT</span></h1>
            <p>Convert game assets to PNG, JPEG, or SVG instantly</p>

            <div class="drop-zone" id="dropZone">
                <span id="dropZoneIcon">📁</span>
                <span id="dropZoneText">Drag & drop asset or click to browse</span>
                <div class="file-info" id="fileInfo"></div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="controls-group">
                <label for="formatSelect">Target Format</label>
                <select id="formatSelect">
                    <option value="image/png">PNG (.png) - Perfect for game sprites</option>
                    <option value="image/jpeg">JPEG (.jpg) - Great for backgrounds</option>
                    <option value="image/svg+xml">SVG (.svg) - Vector graphics</option>
                </select>
            </div>

            <button class="btn-convert" id="convertBtn" disabled>CONVERT & DOWNLOAD</button>
        </div>
    </div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const convertBtn = document.getElementById('convertBtn');
    const formatSelect = document.getElementById('formatSelect');
    const dropZoneText = document.getElementById('dropZoneText');
    
    let selectedFile = null;

    // Click to browse
    dropZone.addEventListener('click', () => fileInput.click());

    // File selected via dialog
    fileInput.addEventListener('change', (e) => {
        handleFileSelection(e.target.files[0]);
    });

    // Drag and Drop handlers
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) {
            handleFileSelection(e.dataTransfer.files[0]);
        }
    });

    function handleFileSelection(file) {
        if (!file || !file.type.startsWith('image/')) {
            alert('Please select a valid image file.');
            return;
        }
        selectedFile = file;
        dropZoneText.innerText = "Change selected file:";
        fileInfo.innerText = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        convertBtn.disabled = false;
    }

    // Conversion Logic using Canvas
    convertBtn.addEventListener('click', () => {
        if (!selectedFile) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Initialize internal canvas for processing
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // Handle transparency logic for JPEG conversions
                const targetFormat = formatSelect.value;
                if (targetFormat === 'image/jpeg') {
                    ctx.fillStyle = '#FFFFFF'; // solid background color fallback
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                ctx.drawImage(img, 0, 0);

                // Export processing
                let dataUrl;
                if (targetFormat === 'image/svg+xml') {
                    // SVG wrapper fallback layout for structural compatibility
                    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${img.width}" height="${img.height}"><image href="${canvas.toDataURL('image/png')}" width="${img.width}" height="${img.height}"/></svg>`;
                    dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
                } else {
                    dataUrl = canvas.toDataURL(targetFormat, 0.9);
                }

                // Trigger seamless download stream
                const downloadLink = document.createElement('a');
                const originalName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.'));
                const extension = targetFormat === 'image/png' ? 'png' : targetFormat === 'image/jpeg' ? 'jpg' : 'svg';
                
                downloadLink.download = `${originalName}_converted.${extension}`;
                downloadLink.href = dataUrl;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(selectedFile);
    });
</script>
</body>
</html>
