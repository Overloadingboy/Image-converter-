<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreConvert // Advanced Asset Studio</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121216;
            --accent: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.2);
            --border: #22222a;
            --text-muted: #888894;
            --success: #00ff88;
        }

        body {
            margin: 0;
            padding: 20px 0;
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        .converter-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-align: center;
        }

        h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Drag & Drop Area */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 24px;
            text-align: center;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(0, 255, 255, 0.02);
            box-shadow: inset 0 0 15px var(--accent-glow);
        }

        .drop-zone icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }

        /* File List Area */
        .file-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            text-align: left;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            display: none;
        }

        .file-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }

        .file-item.done {
            color: var(--success);
        }

        /* Settings Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }

        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        select:focus {
            border-color: var(--accent);
        }

        /* Custom Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            padding: 0;
            height: 6px;
            margin-top: 12px;
            margin-bottom: 8px;
            background: var(--border);
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .quality-val {
            color: var(--accent);
            font-weight: bold;
            float: right;
        }

        /* Convert Button */
        .btn-convert {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-convert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-convert:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="converter-card">
            <h1>CORE<span>CONVERT</span> PRO</h1>
            <p>Batch Image Converter & Compressor</p>

            <div class="drop-zone" id="dropZone">
                <span id="dropZoneIcon" style="font-size: 2.5rem; display:block; margin-bottom: 10px;">📁</span>
                <span id="dropZoneText">Drag & drop files or click to browse</span>
                <input type="file" id="fileInput" accept="image/*" multiple>
                
                <div class="file-list" id="fileList">
                    </div>
            </div>

            <div class="settings-grid">
                <div class="controls-group">
                    <label for="formatSelect">Target Format</label>
                    <select id="formatSelect">
                        <option value="image/png">PNG (.png)</option>
                        <option value="image/jpeg">JPEG (.jpg)</option>
                        <option value="image/webp">WEBP (.webp)</option>
                        <option value="image/bmp">BMP (.bmp)</option>
                        <option value="image/svg+xml">SVG (.svg wrapper)</option>
                    </select>
                </div>

                <div class="controls-group">
                    <label for="qualitySlider">
                        Compression Quality 
                        <span class="quality-val" id="qualityLabel">90%</span>
                    </label>
                    <input type="range" id="qualitySlider" min="0.1" max="1.0" step="0.1" value="0.9">
                    <small style="color: #666; font-size: 0.75rem;">Lower % = Smaller file size</small>
                </div>
            </div>

            <button class="btn-convert" id="convertBtn" disabled>CONVERT FILES</button>
        </div>
    </div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileListDiv = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const formatSelect = document.getElementById('formatSelect');
    const dropZoneText = document.getElementById('dropZoneText');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityLabel = document.getElementById('qualityLabel');
    
    let selectedFiles = [];

    // Update Quality Label
    qualitySlider.addEventListener('input', (e) => {
        qualityLabel.innerText = Math.round(e.target.value * 100) + '%';
        
        // Disable compression slider for PNG and BMP (they are lossless formats)
        const format = formatSelect.value;
        if (format === 'image/png' || format === 'image/bmp' || format === 'image/svg+xml') {
            qualityLabel.innerText = 'Max';
        }
    });

    formatSelect.addEventListener('change', (e) => {
        // Reset slider visual if switching formats
        qualitySlider.dispatchEvent(new Event('input'));
    });

    // Click to browse
    dropZone.addEventListener('click', (e) => {
        if(e.target.id !== 'fileList' && !e.target.closest('.file-list')) {
            fileInput.click();
        }
    });

    // Handle File Input
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    // Drag and Drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
        if (files.length === 0) return;
        
        // Filter out non-images
        const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        
        if (validFiles.length === 0) {
            alert('Please select valid image files.');
            return;
        }

        selectedFiles = validFiles;
        dropZoneText.innerText = `${selectedFiles.length} file(s) selected ready for batch conversion:`;
        
        // Build file list UI
        fileListDiv.style.display = 'block';
        fileListDiv.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            fileListDiv.innerHTML += `<div class="file-item" id="file-${index}"><span>${file.name}</span> <span class="status">Waiting...</span></div>`;
        });

        convertBtn.disabled = false;
        convertBtn.innerText = `CONVERT ${selectedFiles.length} FILES`;
    }

    // Conversion Engine
    convertBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) return;
        
        convertBtn.disabled = true;
        convertBtn.innerText = "PROCESSING...";

        const targetFormat = formatSelect.value;
        const quality = parseFloat(qualitySlider.value);
        const extension = targetFormat.split('/')[1].replace('+xml', '');

        // Process files one by one to avoid browser crash
        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const statusSpan = document.querySelector(`#file-${i} .status`);
            statusSpan.innerText = 'Converting...';
            
            await processSingleFile(file, targetFormat, quality, extension);
            
            // Mark as done
            document.getElementById(`file-${i}`).classList.add('done');
            statusSpan.innerText = '✔ Done';
            
            // Small delay so the browser allows multiple downloads
            await new Promise(r => setTimeout(r, 600)); 
        }

        convertBtn.innerText = "ALL DONE! UPLOAD MORE?";
        convertBtn.disabled = false;
        
        // Note: Browsers will ask "Allow this site to download multiple files?" 
        // User must click "Allow" on the popup.
    });

    function processSingleFile(file, targetFormat, quality, extension) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;

                    // Fill white background if converting to JPEG from transparent PNG
                    if (targetFormat === 'image/jpeg' || targetFormat === 'image/bmp') {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }

                    ctx.drawImage(img, 0, 0);

                    let dataUrl;
                    if (targetFormat === 'image/svg+xml') {
                        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${img.width}" height="${img.height}"><image href="${canvas.toDataURL('image/png')}" width="${img.width}" height="${img.height}"/></svg>`;
                        dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
                    } else {
                        dataUrl = canvas.toDataURL(targetFormat, quality);
                    }

                    // Trigger download
                    const downloadLink = document.createElement('a');
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.'));
                    downloadLink.download = `${originalName}_compressed.${extension}`;
                    downloadLink.href = dataUrl;
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    resolve();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
